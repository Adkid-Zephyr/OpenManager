name: CI

on:
  push:
    paths:
      - '**/*.js'
      - '**/*.html'
      - 'package.json'
      - '.github/workflows/ci.yml'
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Smoke test
        run: npm test
